name: AutoEdge Deploy

on:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json
            global.json

      - name: Restore solution
        run: dotnet restore "AutoEdge.sln"

      - name: Build solution
        run: dotnet build "AutoEdge.sln" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "AutoEdge.sln" --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish web app
        run: dotnet publish "AutoEdge.csproj" --configuration Release --no-build --output "${{ github.workspace }}/publish"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: "${{ github.workspace }}/publish"

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    environment:
      name: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          path: "${{ github.workspace }}/publish"

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: "${{ github.workspace }}/publish"
